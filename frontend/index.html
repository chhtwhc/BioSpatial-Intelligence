<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioSpatial-Intelligence Ver2.0</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        .info-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 15px 20px;
            border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            min-width: 260px; max-width: 320px;
        }
        .info-panel h4 { margin: 0 0 10px 0; border-bottom: 2px solid #eee; padding-bottom: 8px; color: #2c3e50; }
        
        /* 來源切換器樣式 */
        .source-control { margin-bottom: 15px; padding: 10px; background: #f8f9fa; border-radius: 8px; border: 1px solid #e9ecef; }
        .source-control label { display: block; font-size: 0.85em; font-weight: bold; margin-bottom: 5px; color: #666; }
        #source-selector { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ddd; cursor: pointer; font-size: 0.9em; }

        #status { font-size: 0.85em; margin-bottom: 12px; font-weight: bold; }
        .opacity-control { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #ccc; }
        .opacity-control label { font-size: 0.85em; font-weight: bold; display: block; margin-bottom: 5px; }
        #opacity-slider { width: 100%; }

        .stat-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9em; align-items: center; }
        .stat-color-box { width: 14px; height: 14px; border-radius: 3px; margin-right: 8px; border: 1px solid rgba(0,0,0,0.1); }
        .stat-value { font-family: 'Consolas', monospace; font-weight: 600; color: #2c3e50; }
        .total-area { margin-top: 10px; padding-top: 10px; border-top: 2px solid #eee; text-align: right; font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>

    <div class="info-panel">
        <h4>棲地空間監測 Ver2.0</h4>
        
        <div class="source-control">
            <label for="source-selector">🛰️ 選擇 AI 分析來源</label>
            <select id="source-selector">
                <option value="sentinel">Sentinel-2 (10m 衛星)</option>
                <option value="nlsc">NLSC 航照 (高解析正射影像)</option>
            </select>
        </div>

        <div id="status">📡 正在初始化系統...</div>
        
        <div class="opacity-control">
            <label for="opacity-slider">透明度: <span id="opacity-val">50%</span></label>
            <input type="range" id="opacity-slider" min="0" max="1" step="0.1" value="0.5">
        </div>

        <div id="dashboard"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- 1. 初始化底圖 ---
        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' });
        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' });

        const map = L.map('map', {
            center: [24.185, 120.705],
            zoom: 15,
            layers: [satelliteLayer] 
        });

        L.control.layers({ "衛星影像 (Esri)": satelliteLayer, "標準地圖 (OSM)": osmLayer }).addTo(map);

        // --- 2. 核心狀態與配色 ---
        const habitatColors = {
            "水體/河流": "#2b8cbe",
            "高植生/林地": "#238b45",
            "都市建物/人造設施": "#737373",
            "裸露地/工地": "#8c510a"
        };

        let currentOpacity = 0.5;
        let currentSource = "sentinel"; // 預設來源

        let geojsonLayer = L.geoJSON(null, {
            style: (feature) => ({
                fillColor: habitatColors[feature.properties.habitat_type] || "#bdc3c7",
                weight: 1,
                color: '#ffffff',
                fillOpacity: currentOpacity
            }),
            onEachFeature: (feature, layer) => {
                const props = feature.properties;
                layer.bindPopup(`
                    <div style="min-width: 150px;">
                        <b style="font-size: 1.1em; color:#2c3e50;">${props.habitat_type}</b><br/>
                        <hr style="margin: 5px 0; border: 0; border-top: 1px solid #eee;">
                        面積：<b>${props.area_sqm.toLocaleString()}</b> m²<br/>
                        來源：<span style="color:#e67e22; font-weight:bold;">${props.source.toUpperCase()}</span>
                    </div>
                `);
            }
        }).addTo(map);

        // --- 3. 互動邏輯 ---
        
        // 透明度拉桿
        document.getElementById('opacity-slider').addEventListener('input', (e) => {
            currentOpacity = parseFloat(e.target.value);
            document.getElementById('opacity-val').innerText = Math.round(currentOpacity * 100) + '%';
            geojsonLayer.setStyle({ fillOpacity: currentOpacity });
        });

        // [新增] 來源切換連動
        document.getElementById('source-selector').addEventListener('change', (e) => {
            currentSource = e.target.value;
            fetchHabitatsInView(); // 立即重新抓取
        });

        // 儀表板更新
        function updateDashboard(features) {
            const dashboardEl = document.getElementById('dashboard');
            if (features.length === 0) {
                dashboardEl.innerHTML = "<div style='color:#666; text-align:center;'>此區域無資料</div>";
                return;
            }

            let stats = {};
            let totalArea = 0;
            features.forEach(f => {
                const type = f.properties.habitat_type;
                const area = f.properties.area_sqm;
                stats[type] = (stats[type] || 0) + area;
                totalArea += area;
            });

            let html = "";
            for (const [type, area] of Object.entries(stats)) {
                const color = habitatColors[type] || "#bdc3c7";
                const areaHa = (area / 10000).toFixed(2);
                html += `
                    <div class="stat-item">
                        <div><span class="stat-color-box" style="background:${color}"></span>${type}</div>
                        <div class="stat-value">${areaHa} ha</div>
                    </div>
                `;
            }
            html += `<div class="total-area">總計面積: ${(totalArea / 10000).toFixed(2)} ha</div>`;
            dashboardEl.innerHTML = html;
        }

        // 非同步資料抓取 (帶有 Source 參數)
        async function fetchHabitatsInView() {
            const statusEl = document.getElementById('status');
            statusEl.innerText = `⏳ 讀取 ${currentSource.toUpperCase()} 資料...`;
            statusEl.style.color = "#d35400";

            try {
                const bounds = map.getBounds();
                const bboxString = `${bounds.getWest()},${bounds.getSouth()},${bounds.getEast()},${bounds.getNorth()}`;
                
                // [修改點]：API 請求現在帶上 source 參數
                const response = await fetch(`http://127.0.0.1:8000/habitats?bbox=${bboxString}&source=${currentSource}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                
                geojsonLayer.clearLayers();
                geojsonLayer.addData(data);
                updateDashboard(data.features);

                statusEl.innerText = `✅ ${currentSource.toUpperCase()}: ${data.features.length} 個圖元`;
                statusEl.style.color = "#27ae60";
            } catch (error) {
                console.error('Fetch Error:', error);
                statusEl.innerText = "❌ 伺服器連線異常";
                statusEl.style.color = "#c0392b";
                geojsonLayer.clearLayers();
                document.getElementById('dashboard').innerHTML = "";
            }
        }

        // 監聽地圖事件
        map.on('moveend', fetchHabitatsInView);
        fetchHabitatsInView();
    </script>
</body>
</html>
